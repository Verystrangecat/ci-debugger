name: CI Pipeline

on: [push]

env:
  APP_NAME: myapp
  APP_VERSION: "2.1.0"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      artifact: ${{ steps.meta.outputs.artifact }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show context
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Branch:     ${{ github.ref_name }}"
          echo "SHA:        ${{ github.sha }}"

      - id: meta
        name: Set build metadata
        run: |
          echo "version=${{ env.APP_VERSION }}" >> $GITHUB_OUTPUT
          echo "artifact=${{ env.APP_NAME }}-${{ env.APP_VERSION }}.tar.gz" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          echo "Building ${{ env.APP_NAME }} v${{ env.APP_VERSION }}..."
          echo "Done."

  test:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        go: ["1.22", "1.23"]
    steps:
      - name: Run tests (Go ${{ matrix.go }})
        run: echo "Testing with Go ${{ matrix.go }}..."

      - name: Check artifact
        run: echo "Artifact: ${{ needs.build.outputs.artifact }}"

      - name: Coverage check
        if: success()
        run: echo "Coverage OK"

  deploy:
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - name: Deploy ${{ needs.build.outputs.version }}
        run: |
          echo "Deploying ${{ needs.build.outputs.artifact }}"
          echo "Version: ${{ needs.build.outputs.version }}"
          echo "Deploy complete."
