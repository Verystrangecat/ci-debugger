name: Multi Job Test

on: [push]

env:
  GLOBAL_VAR: "from-workflow"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JOB_VAR: "from-job"
    steps:
      - name: Build step
        run: echo "Building... GLOBAL=$GLOBAL_VAR JOB=$JOB_VAR"

      - name: Set output
        run: echo "artifact=my-binary" >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test step
        run: echo "Testing..."

      - name: Another test
        run: |
          echo "Running tests"
          exit 0
