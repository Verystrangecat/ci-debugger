version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/ci-debugger
    binary: ci-debugger
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^demo:"
      - "^test:"

brews:
  - repository:
      owner: murataslan1
      name: homebrew-tap
    name: ci-debugger
    homepage: "https://github.com/murataslan1/ci-debugger"
    description: "Debug CI pipelines locally with breakpoints"
    license: "MIT"
    install: |
      bin.install "ci-debugger"
    test: |
      system "#{bin}/ci-debugger", "--version"

release:
  github:
    owner: murataslan1
    name: ci-debugger
  draft: false
  prerelease: auto
