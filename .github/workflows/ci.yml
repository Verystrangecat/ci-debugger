name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Vet
        run: go vet ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Build binary
        run: go build -ldflags "-X main.version=${{ github.sha }}" -o bin/ci-debugger ./cmd/ci-debugger

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-debugger-linux
          path: bin/ci-debugger
